    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="home.html" class="logo">ALFAIZ SWEETS</a>
        <button id="theme-toggle">🌙 Dark Mode</button>
        
        <nav><ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul></nav>
    </header>

    <section class="container">
        <h2 class="section-title">Get In Touch</h2>
        <div class="contact-wrapper">
            <div class="contact-links">
                <p>Have a bulk order or a question? Reach out to us directly.</p>
                <a href="mailto:waqasahmedqadri5@gmail.com">
                    <strong>📧 Email:</strong> waqasahmedqadri5@gmail.com
                </a>
                <a href="https://wa.me/923408188724" target="_blank" style="color: #25D366;">
                    <strong>📱 WhatsApp:</strong> 03408188724
                </a>
                <p style="margin-top: 20px; font-size: 0.9rem; color: #888;">Available 9:00 AM - 11:00 PM</p>
            </div>
        </div>
    </section>
    <script>
        const btn = document.getElementById("theme-toggle");
        const currentTheme = localStorage.getItem("theme");
        
        // Check for saved theme preference
        if (currentTheme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            btn.textContent = "☀️ Light Mode";
        }

        btn.addEventListener("click", () => {
            let theme = document.documentElement.getAttribute("data-theme");
            if (theme === "light") {
                document.documentElement.setAttribute("data-theme", "dark");
                btn.textContent = "☀️ Light Mode";
                localStorage.setItem("theme", "dark");
            } else {
                document.documentElement.setAttribute("data-theme", "light");
                btn.textContent = "🌙 Dark Mode";
                localStorage.setItem("theme", "light");
            }
        });
        
    </script>
</body>
</html>
